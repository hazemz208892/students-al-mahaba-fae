<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>كارينيه المحبة - النسخة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; background: #fff; }
        .bg-full-bus { position: absolute; height: 100%; width: 100%; left: 0; top: 0; object-fit: cover; z-index: 0; }
        
        #cart {
            position: relative; z-index: 20; border-radius: 0.375rem; 
            overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4);
            width: 340px; height: 220px;
        }
        @media (min-width: 1024px) { #cart { width: 420px; height: 265px; } }

        .card-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            background-image: url('https://students.al-mahaba.online/_next/static/media/card.abefcc65.png');
            background-size: cover; background-position: center;
        }
        
        .toast-container {
            position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
            z-index: 9999; width: 320px; display: none;
        }
        .toast-success-exact {
            background-color: white; color: #757575; padding: 14px; border-radius: 4px;
            border-right: 6px solid #07bc0c; display: flex; align-items: center;
            box-shadow: 0 1px 10px 0 rgba(0,0,0,0.1); position: relative; overflow: hidden;
        }
        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background-color: #07bc0c; opacity: 0.7; width: 100%;
            animation: shrink 3s linear forwards;
        }
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
    </style>
</head>
<body class="antialiased bg-white text-black">

    <div id="toast" class="toast-container">
        <div class="toast-success-exact">
            <div class="bg-[#07bc0c] rounded-full p-1 ml-3 flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div class="flex flex-col text-right">
                <span class="font-bold text-black text-[14px]">تم التحقق بنجاح</span>
                <span class="text-[12px]">البيانات مطابقة لسجلاتنا</span>
            </div>
            <div class="progress-bar"></div>
        </div>
    </div>

    <div class="relative min-h-screen flex items-center justify-center py-6 sm:py-12">
        <img alt="Background" src="https://students.al-mahaba.online/_next/static/media/56.0c89614c.png" class="bg-full-bus">
        <div class="absolute inset-0 bg-black/80 z-10"></div>

        <div class="z-20 w-full flex flex-col items-center">
            <div id="cart" class="mb-12">
                <div class="card-bg"></div>

                <div class="absolute max-w-7/12 top-2 right-1 sm:right-2 text-white text-right">
                    <h2 class="text-[11px] lg:text-sm font-semibold">أبو قرقاص "الفكرية" : الجامعة الأهلية</h2>
                </div>

                <!-- صورتك بالمقاس المتجاوب المظبوط -->
                <img alt="Student" src="hazem.jpg" 
                     class="absolute rounded-sm object-cover 
                            w-[84px] h-[102px] left-[15px] top-[19px] 
                            lg:w-[104px] lg:h-[126px] lg:left-[19px] lg:top-[23px]"
                     style="z-index: 50; object-position: center;">

                <h2 class="absolute top-[44px] right-[82px] max-w-5/12 text-[12px] lg:text-[14px] lg:top-[58px] lg:right-[102px] font-semibold text-black">حازم علي عبدالعال</h2>
                <h2 class="absolute top-[76px] right-[82px] text-[11px] lg:text-[13px] lg:top-[96px] lg:right-[102px] font-semibold text-black/80">حاسبات و ذكاء اصطناعي</h2>
                <h2 class="absolute top-[110px] right-[82px] text-[11px] lg:text-[13px] lg:top-[136px] lg:right-[102px] font-semibold text-black/80">الفرقة الثانية</h2>
                <h2 class="absolute top-[146px] right-[135px] text-[11px] lg:text-[13px] lg:top-[179px] lg:right-[162px] font-semibold text-black/80">الثاني</h2>

                <span class="absolute bottom-[3px] left-[170px] lg:left-[210px] text-black text-[16px] font-bold">N1121</span>

                <div class="absolute bottom-[17px] right-[10px] lg:bottom-[22px] lg:right-[19px] flex items-center justify-center" style="width: 62px; height: 62px;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://hazemz208892.github.io/students-al-mahaba-fae/" class="w-full h-full" alt="QR Code">
                </div>

                <span class="absolute bottom-[16px] left-[58px] lg:bottom-[20px] lg:left-[76px] text-white text-[7px] lg:text-[8px] italic opacity-80">699494a31b2135cb8c9fcfae</span>
                <span class="absolute bottom-[0px] right-[62px] lg:bottom-[1px] lg:right-[62px] text-white text-[13px] lg:text-[13px] italic font-medium">BY : Mariam</span>
                
                <!-- تم حذف سطر الختم المكسور الذي يسبب علامة الاستفهام -->
            </div>
            <div class="text-[#757575] text-[11px] font-bold mt-2">محرك بحث الطلاب المعتمد © 2026</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.6s ease';
                setTimeout(() => { toast.style.display = 'none'; }, 600);
            }, 3000); 
        };
    </script>
</body>
</html>
